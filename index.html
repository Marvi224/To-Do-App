<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do App</title>
    <link rel="stylesheet" href="to-do-app.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card">
      <header>
        <h1>My To-Do List</h1>
        <p>Stay on top of your tasks</p>
      </header>

      <div>
        
        <input type="text" placeholder="Add new tasks..." id="tasks" />
        <button id="addBtn">Add</button>
        <p id="errorMessage"></p>
      </div>
      <br />
      <ul id="userTasks"></ul>

      <p id="taskNumber"></p>
    </div>

    <script src="to-do-app.js"></script>
  </body>
</html>
